name: python-lambda-package
description: package the Python Lambda and optionally publish it to S3

inputs:
  app_name:
    description: application name used for the zip file
    required: true
  working_directory:
    description: Python project directory
    default: "api"
  artifact_bucket:
    description: optional S3 bucket to publish the Lambda zip
    default: ""
  artifact_prefix:
    description: S3 prefix used when artifact_bucket is set
    default: "lambda"
  sign_artifact:
    description: sign the zip with cosign keyless signing
    default: "true"
  artifact_retention_days:
    description: days to keep the GitHub artifact
    default: "7"

outputs:
  artifact_name:
    description: packaged zip file name
    value: ${{ steps.package.outputs.artifact_name }}
  s3_key:
    description: S3 key used when artifact_bucket is set
    value: ${{ steps.publish.outputs.s3_key }}

runs:
  using: "composite"
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: pip
        cache-dependency-path: ${{ inputs.working_directory }}/requirements.txt

    - name: Package Lambda
      id: package
      shell: bash
      run: |
        mkdir -p artifacts build/lambda
        rm -rf build/lambda/*

        python -m pip install --upgrade pip
        python -m pip install -r "${{ inputs.working_directory }}/requirements.txt" -t build/lambda
        cp -R "${{ inputs.working_directory }}/app" build/lambda/

        ARTIFACT="${{ inputs.app_name }}-${{ github.sha }}.zip"
        (cd build/lambda && zip -qr "../../artifacts/${ARTIFACT}" .)

        echo "artifact_name=${ARTIFACT}" >> "$GITHUB_OUTPUT"
        echo "Created artifacts/${ARTIFACT}"

    - name: Install cosign
      if: inputs.sign_artifact == 'true'
      uses: sigstore/cosign-installer@v3

    - name: Sign Lambda artifact
      if: inputs.sign_artifact == 'true'
      shell: bash
      env:
        COSIGN_EXPERIMENTAL: "1"
      run: |
        ARTIFACT="artifacts/${{ steps.package.outputs.artifact_name }}"
        cosign sign-blob "$ARTIFACT" --bundle "${ARTIFACT}.bundle" --yes

    - name: Upload Lambda artifact
      uses: actions/upload-artifact@v4
      with:
        name: lambda-package
        path: |
          artifacts/${{ steps.package.outputs.artifact_name }}
          artifacts/${{ steps.package.outputs.artifact_name }}.bundle
        retention-days: ${{ inputs.artifact_retention_days }}
        if-no-files-found: warn

    - name: Publish Lambda artifact to S3
      id: publish
      if: inputs.artifact_bucket != ''
      shell: bash
      run: |
        ARTIFACT="${{ steps.package.outputs.artifact_name }}"
        S3_KEY="${{ inputs.artifact_prefix }}/${ARTIFACT}"

        aws s3 cp "artifacts/${ARTIFACT}" "s3://${{ inputs.artifact_bucket }}/${S3_KEY}" \
          --server-side-encryption aws:kms

        if [ -f "artifacts/${ARTIFACT}.bundle" ]; then
          aws s3 cp "artifacts/${ARTIFACT}.bundle" "s3://${{ inputs.artifact_bucket }}/${S3_KEY}.bundle" \
            --server-side-encryption aws:kms
        fi

        echo "s3_key=${S3_KEY}" >> "$GITHUB_OUTPUT"
        echo "Published s3://${{ inputs.artifact_bucket }}/${S3_KEY}"
