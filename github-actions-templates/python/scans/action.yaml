name: python-checks
description: Python tests and small security scans for the restaurant API

inputs:
  python_version:
    description: Python version to use
    default: "3.10"
  working_directory:
    description: Python project directory
    default: "api"
  run_security:
    description: Run Bandit, pip-audit and Gitleaks
    default: "true"

runs:
  using: "composite"
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python_version }}
        cache: pip
        cache-dependency-path: ${{ inputs.working_directory }}/requirements.txt

    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install bandit pip-audit

    - name: Run tests
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: python -m pytest tests

    - name: Compile app
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: python -m compileall app

    # Bandit catches risky Python code patterns.
    - name: Bandit scan
      if: inputs.run_security == 'true'
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: bandit -r app -x tests -ll

    # pip-audit checks Python packages for known CVEs.
    - name: Dependency scan
      if: inputs.run_security == 'true'
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: pip-audit -r requirements.txt

    # Gitleaks checks that secrets were not committed.
    - name: Secret scan
      if: inputs.run_security == 'true'
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ github.token }}
      with:
        args: detect --source . --redact --exit-code 1
