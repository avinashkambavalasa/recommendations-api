name: Deploy lambda API

on:
  workflow_dispatch:
    inputs:
      account_name:
        description: AWS account folder under terragrunt/aws
        required: true
        default: aws-account-name
      environment_name:
        description: Environment folder under the account
        required: true
        default: prod
      stack:
        description: Terragrunt stack folder
        required: true
        default: recommendation-api
      AWS_REGION:
        description: AWS region
        required: true
        default: us-east-2
      LAMBDA_ARTIFACT_BUCKET:
        description: Optional S3 bucket for the signed Lambda zip
        required: false
        default: ""
      LAMBDA_ARTIFACT_KEY:
        description: Optional S3 key for the signed Lambda zip
        required: false
        default: ""
      API_URL:
        description: Optional API URL for smoke test
        required: false
        default: ""

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: "1.4.5"
  TG_VERSION: "0.67.16"
  AWS_REGION: ${{ inputs.AWS_REGION }}
  LAMBDA_ARTIFACT_BUCKET: ${{ inputs.LAMBDA_ARTIFACT_BUCKET }}
  LAMBDA_ARTIFACT_KEY: ${{ inputs.LAMBDA_ARTIFACT_KEY }}
  PLAN_FILE: tfplan-${{ github.run_id }}-${{ github.run_attempt }}
  PLAN_ARTIFACT: terragrunt-plan-${{ github.run_id }}-${{ github.run_attempt }}

jobs:
  plan:
    name: Terragrunt plan
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-plan-${{ inputs.account_name }}-${{ inputs.environment_name }}-${{ inputs.stack }}
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: recommendation-api-plan-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Install Terragrunt
        run: |
          curl -sSL "https://github.com/gruntwork-io/terragrunt/releases/download/v${TG_VERSION}/terragrunt_linux_amd64" -o terragrunt
          chmod +x terragrunt
          sudo mv terragrunt /usr/local/bin/terragrunt

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      # make sure the lambda zip is the one signed by ci
      - name: Verify Lambda artifact signature
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          BUCKET="${LAMBDA_ARTIFACT_BUCKET}"
          KEY="${LAMBDA_ARTIFACT_KEY}"

          if [ -z "$BUCKET" ] || [ -z "$KEY" ]; then
            echo "No S3 Lambda artifact configured, skipping signature check"
            exit 0
          fi

          aws s3 cp "s3://${BUCKET}/${KEY}" lambda.zip
          aws s3 cp "s3://${BUCKET}/${KEY}.bundle" lambda.zip.bundle

          cosign verify-blob lambda.zip \
            --bundle lambda.zip.bundle \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/.github/workflows/ci.yml@.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com"

      # Plan first so the reviewer can see the exact infra change before approving apply.
      - name: Plan
        run: |
          TG_DIR="terragrunt/aws/${{ inputs.account_name }}/${{ inputs.environment_name }}/${{ inputs.stack }}"
          cd "$TG_DIR"
          terragrunt init -input=false -no-color
          terragrunt plan -input=false -no-color -out="${PLAN_FILE}"

      # apply will use this exact plan file
      - name: Upload plan
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PLAN_ARTIFACT }}
          path: terragrunt/aws/${{ inputs.account_name }}/${{ inputs.environment_name }}/${{ inputs.stack }}/${{ env.PLAN_FILE }}
          retention-days: 1
          if-no-files-found: error

      # clean the runner even if something failed
      - name: Clean workspace
        if: always()
        run: rm -rf "$GITHUB_WORKSPACE"

  apply:
    name: Terragrunt apply
    runs-on: ubuntu-latest
    needs: [plan]
    environment: production
    concurrency:
      group: deploy-apply-${{ inputs.account_name }}-${{ inputs.environment_name }}-${{ inputs.stack }}
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: recommendation-api-apply-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Install Terragrunt
        run: |
          curl -sSL "https://github.com/gruntwork-io/terragrunt/releases/download/v${TG_VERSION}/terragrunt_linux_amd64" -o terragrunt
          chmod +x terragrunt
          sudo mv terragrunt /usr/local/bin/terragrunt

      - name: Download approved plan
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.PLAN_ARTIFACT }}
          path: terragrunt/aws/${{ inputs.account_name }}/${{ inputs.environment_name }}/${{ inputs.stack }}

      # only apply the plan that was approved
      - name: Apply
        run: |
          TG_DIR="terragrunt/aws/${{ inputs.account_name }}/${{ inputs.environment_name }}/${{ inputs.stack }}"
          cd "$TG_DIR"
          terragrunt init -input=false -no-color
          terragrunt apply -input=false -no-color "${PLAN_FILE}"

      # quick api check after deploy
      - name: Smoke test
        env:
          API_URL: ${{ inputs.API_URL }}
        run: |
          if [ -z "$API_URL" ]; then
            echo "API_URL is not set, skipping smoke test"
            exit 0
          fi

          curl -fsS "${API_URL}/recommendations?style=Italian&open_at=12:00" | python3 -m json.tool

      # clean the runner even if something failed
      - name: Clean workspace
        if: always()
        run: rm -rf "$GITHUB_WORKSPACE"
